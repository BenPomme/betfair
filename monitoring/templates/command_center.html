<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strategy Command Center</title>
  <style>
    :root {
      --bg: #07111a;
      --panel: rgba(10, 21, 32, 0.84);
      --panel-2: rgba(16, 31, 44, 0.9);
      --line: rgba(141, 169, 196, 0.18);
      --text: #e8f0f7;
      --muted: #94a9bc;
      --good: #53c58a;
      --warn: #f0b85c;
      --bad: #ef6b6b;
      --accent: #79c2ff;
      --accent-2: #ffd27f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Aptos", "Segoe UI Variable", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(121,194,255,0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(255,210,127,0.10), transparent 24%),
        linear-gradient(180deg, #0a1621 0%, #07111a 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .shell {
      width: min(1500px, 96vw);
      margin: 0 auto;
      padding: 24px 0 40px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 20px;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: 0.02em;
    }
    .hero p { margin: 6px 0 0; color: var(--muted); }
    .statusbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pill, button {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 14px;
      font-size: 0.92rem;
    }
    button { cursor: pointer; }
    button:hover { border-color: rgba(121,194,255,0.45); }
    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    nav button.active {
      background: linear-gradient(90deg, rgba(121,194,255,0.18), rgba(255,210,127,0.14));
      border-color: rgba(121,194,255,0.35);
    }
    .section {
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      backdrop-filter: blur(10px);
      margin-bottom: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.18);
    }
    .section.active { display: block; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .card {
      background: rgba(10, 24, 36, 0.85);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .card h3 { margin: 0 0 4px; }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin: 14px 0 18px;
    }
    .metric {
      padding: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    .metric .label { color: var(--muted); font-size: 0.86rem; }
    .metric .value { font-size: 1.2rem; font-weight: 700; margin-top: 6px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .good { color: var(--good); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.92rem;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(141,169,196,0.12);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    .two-col {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }
    .panel {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .sparkline {
      width: 100%;
      height: 64px;
      display: block;
      margin-top: 8px;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      font-size: 0.84rem;
      color: #dbe7f0;
    }
    @media (max-width: 980px) {
      .two-col { grid-template-columns: 1fr; }
      .hero { flex-direction: column; align-items: start; }
      .statusbar { justify-content: start; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div>
        <h1>Strategy Command Center</h1>
        <p>Independent paper portfolios, isolated ledgers, and strategy-specific readiness.</p>
      </div>
      <div class="statusbar">
        <div class="pill" id="boot-pill">Connecting</div>
        <div class="pill" id="time-pill">--</div>
      </div>
    </div>

    <nav id="nav"></nav>

    <section class="section active" id="section-overview">
      <h2>Overview</h2>
      <div class="panel" id="notifications-panel" style="margin-bottom:14px;"></div>
      <div class="cards" id="overview-cards"></div>
    </section>

    <section class="section" id="section-portfolios">
      <h2>Portfolios</h2>
      <div class="panel" id="portfolios-panel"></div>
    </section>

    <section class="section" id="section-compare">
      <h2>Compare</h2>
      <div class="panel" id="compare-panel"></div>
    </section>

    <section class="section" id="section-betfair_core"><h2>Betfair Core</h2><div id="betfair_core-body"></div></section>
    <section class="section" id="section-hedge_validation"><h2>Hedge Validation</h2><div id="hedge_validation-body"></div></section>
    <section class="section" id="section-hedge_research"><h2>Hedge Research</h2><div id="hedge_research-body"></div></section>
    <section class="section" id="section-cascade_alpha"><h2>Cascade Alpha</h2><div id="cascade_alpha-body"></div></section>
    <section class="section" id="section-mev_scout_sol"><h2>MEV Scout</h2><div id="mev_scout_sol-body"></div></section>
    <section class="section" id="section-contrarian_legacy"><h2>Contrarian Legacy</h2><div id="contrarian_legacy-body"></div></section>
  </div>

  <script>
    const portfolioOrder = ["betfair_core", "hedge_validation", "hedge_research", "cascade_alpha", "mev_scout_sol", "contrarian_legacy"];
    const labels = {
      overview: "Overview",
      portfolios: "Portfolios",
      compare: "Compare",
      betfair_core: "Betfair",
      hedge_validation: "Hedge Validation",
      hedge_research: "Hedge Research",
      cascade_alpha: "Cascade Alpha",
      mev_scout_sol: "MEV Scout",
      contrarian_legacy: "Contrarian"
    };

    async function getJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${url}: ${res.status}`);
      return await res.json();
    }

    async function postJSON(url) {
      const res = await fetch(url, { method: "POST" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail?.error || data.error || `${url}: ${res.status}`);
      return data;
    }

    function money(value, currency) {
      const n = Number(value || 0);
      return new Intl.NumberFormat(undefined, { style: "currency", currency, maximumFractionDigits: 2 }).format(n);
    }

    function pct(value) {
      return `${Number(value || 0).toFixed(2)}%`;
    }

    function readinessDisplay(label) {
      const mapping = {
        blocked: 'Not Live Ready',
        research_only: 'Research Only',
        paper_validating: 'Paper Validating',
        candidate: 'Live Candidate',
        ready_disabled: 'Ready, Live Disabled',
        live_ready: 'Live Ready',
        ready: 'Live Ready',
        validated: 'Validated Paper',
        monitoring: 'Monitoring',
        unknown: 'Unknown'
      };
      return mapping[label] || label || 'Unknown';
    }

    function readinessTone(label) {
      if (["ready", "validated", "live_ready", "candidate", "ready_disabled"].includes(label)) return "good";
      if (["research_only", "monitoring", "paper_validating"].includes(label)) return "warn";
      if (["blocked", "unknown"].includes(label)) return "bad";
      return "muted";
    }

    function readinessProgress(readiness) {
      const checks = readiness?.checks_v2 || readiness?.checks || [];
      const blockers = readiness?.blockers_v2 || readiness?.blockers || [];
      if (checks.length) {
        const passed = checks.filter(c => c && c.ok).length;
        return {
          pct: Math.round((passed / checks.length) * 100),
          passed,
          total: checks.length,
          blockers: blockers.length,
        };
      }
      if (typeof readiness?.score_pct === 'number') {
        return {
          pct: Math.round(Number(readiness.score_pct || 0)),
          passed: null,
          total: null,
          blockers: blockers.length,
        };
      }
      return { pct: blockers.length ? 0 : 50, passed: null, total: null, blockers: blockers.length };
    }

    function progressBar(pctValue) {
      const pct = Math.max(0, Math.min(100, Number(pctValue || 0)));
      return `
        <div style="margin-top:8px;">
          <div style="height:10px;border-radius:999px;background:rgba(255,255,255,0.06);overflow:hidden;border:1px solid var(--line);">
            <div style="width:${pct}%;height:100%;background:linear-gradient(90deg, rgba(121,194,255,0.85), rgba(255,210,127,0.8));"></div>
          </div>
        </div>`;
    }

    function topBlockers(readiness) {
      const blockers = readiness?.blockers_v2 || readiness?.blockers || [];
      return blockers.slice(0, 3);
    }

    function metricCard(label, value) {
      return `<div class="metric"><div class="label">${label}</div><div class="value">${value}</div></div>`;
    }

    function yesNo(value) {
      return value ? 'Yes' : 'No';
    }

    function compactNumber(value) {
      return Number(value || 0).toLocaleString(undefined, { maximumFractionDigits: 2 });
    }

    function renderDirectionPanel(portfolioId, state) {
      const raw = state.raw_state || {};
      const models = state.models || [];
      if (portfolioId === 'betfair_core') {
        const auth = raw.auth || {};
        const health = raw.health || {};
        const predictionSummary = raw.prediction_summary || {};
        const league = raw.prediction_league_summary || {};
        const modelCount = models.length;
        const matureModels = models.filter(m => (m.metrics || {}).strict_gate_pass).length;
        const learningTracked = models.reduce((acc, m) => acc + Number((m.metrics || {}).learning_tracked || 0), 0);
        const learningSettled = models.reduce((acc, m) => acc + Number((m.metrics || {}).learning_settled || 0), 0);
        return `
          <div class="panel">
            <h3>Betfair Direction</h3>
            <div class="grid">
              ${metricCard('Auth Mode', auth.login_mode || 'n/a')}
              ${metricCard('Feed Status', health.feed_status || 'n/a')}
              ${metricCard('Models Loaded', modelCount)}
              ${metricCard('Strict-Pass Models', matureModels)}
              ${metricCard('Learning Tracked', learningTracked)}
              ${metricCard('Learning Settled', learningSettled)}
              ${metricCard('Prediction League P&L', money(league.realized_pnl_eur || 0, 'EUR'))}
              ${metricCard('Prediction League ROI', pct(league.avg_roi_pct || 0))}
              ${metricCard('Prediction Open Positions', league.open_positions || 0)}
            </div>
            <div class="muted">Healthy direction means: certificate auth ready, feed healthy, more settled bets, and strict-pass model count increasing from zero.</div>
            <div class="muted" style="margin-top:8px;">Core arbitrage book and prediction league are separate. Core P&L can be zero while model accounts are still actively learning and trading.</div>
            <div class="muted" style="margin-top:8px;">Prediction summary: active=${predictionSummary.active_model_count || 0}, leader=${predictionSummary.leader_model_id || 'n/a'}, best model by realized P&L=${league.best_model_id || 'n/a'}.</div>
          </div>`;
      }
      if (portfolioId === 'hedge_validation') {
        const learner = (models[0] || {}).metrics || {};
        const audit = raw.settlement_audit || {};
        const rejectionRate = Number((raw.execution_quality || {}).rejection_rate || 0) * 100;
        return `
          <div class="panel">
            <h3>Hedge Direction</h3>
            <div class="grid">
              ${metricCard('Closed Hedges', raw.closed_hedges || 0)}
              ${metricCard('Funding Events', audit.realized_funding_events || 0)}
              ${metricCard('Reject Rate', pct(rejectionRate))}
              ${metricCard('Current AUC', compactNumber(learner.current_auc))}
              ${metricCard('Strict Gate Pass', yesNo(learner.strict_gate_pass))}
              ${metricCard('Next Settlement', raw.next_settlement_utc || 'n/a')}
            </div>
            <div class="muted">Healthy direction means: more closed hedges, more funding events captured, rejection rate falling, and strict gate eventually turning true.</div>
          </div>`;
      }
      if (portfolioId === 'hedge_research') {
        const learner = (models[0] || {}).metrics || {};
        const audit = raw.settlement_audit || {};
        return `
          <div class="panel">
            <h3>Hedge Research Direction</h3>
            <div class="grid">
              ${metricCard('Closed Hedges', raw.closed_hedges || 0)}
              ${metricCard('Funding Events', audit.realized_funding_events || 0)}
              ${metricCard('Entry Window', `${raw.entry_window_minutes || raw.config_entry_window_minutes || 120}m`)}
              ${metricCard('Shared Learner Writer', yesNo(raw.shared_learner_writer))}
              ${metricCard('Current AUC', compactNumber(learner.current_auc))}
              ${metricCard('Strict Gate Pass', yesNo(learner.strict_gate_pass))}
            </div>
            <div class="muted">Healthy direction means: this looser book is generating more settled funding labels and improving the shared learner that the strict hedge validation reads.</div>
          </div>`;
      }
      if (portfolioId === 'contrarian_legacy') {
        const learner = (models[0] || {}).metrics || {};
        const quality = raw.training_quality || {};
        return `
          <div class="panel">
            <h3>Contrarian Direction</h3>
            <div class="grid">
              ${metricCard('Unique Symbols', quality.unique_symbol_count ?? 'n/a')}
              ${metricCard('Quarantined Symbols', raw.quarantined_symbol_count || 0)}
              ${metricCard('AUC', compactNumber(learner.current_auc))}
              ${metricCard('Prediction Saturation', pct((learner.prediction_saturation_rate || 0) * 100))}
              ${metricCard('Strict Gate Pass', yesNo(learner.strict_gate_pass))}
              ${metricCard('Settled', learner.settled_count || 0)}
            </div>
            <div class="muted">Healthy direction means: broader symbol coverage, fewer concentrated duplicate trades, more settled outcomes, and gate quality moving above baseline.</div>
          </div>`;
      }
      if (portfolioId === 'cascade_alpha') {
        const rawTrades = state.recent_trades || [];
        const closed = rawTrades.filter(t => (t.status || '').toUpperCase() === 'CLOSED');
        const wins = closed.filter(t => Number(t.net_pnl_usd || 0) >= 0).length;
        const avgPnl = closed.length ? closed.reduce((a, t) => a + Number(t.net_pnl_usd || 0), 0) / closed.length : 0;
        const avgSlip = closed.length ? closed.reduce((a, t) => a + Number(t.slippage_bps || 0), 0) / closed.length : 0;
        return `
          <div class="panel">
            <h3>Cascade Direction</h3>
            <div class="grid">
              ${metricCard('Signals Seen', raw.signal_count || 0)}
              ${metricCard('Closed Trades', closed.length)}
              ${metricCard('Win Rate', closed.length ? pct((wins / closed.length) * 100) : 'n/a')}
              ${metricCard('Avg Trade P&L', compactNumber(avgPnl))}
              ${metricCard('Avg Slippage Bps', compactNumber(avgSlip))}
              ${metricCard('Watchlist Size', raw.watchlist_size || 0)}
            </div>
            <div class="muted">Healthy direction means: more closed trades, better win rate, and net trade P&L improving after fees and slippage.</div>
          </div>`;
      }
      if (portfolioId === 'mev_scout_sol') {
        const learner = raw.learner || {};
        const progress = raw.training_progress || {};
        return `
          <div class="panel">
            <h3>MEV Direction</h3>
            <div class="grid">
              ${metricCard('Provider Mode', raw.provider_mode || 'none')}
              ${metricCard('Observed Events', learner.observed_events || 0)}
              ${metricCard('Whales Seen', learner.whale_events || 0)}
              ${metricCard('Labeled Opportunities', learner.settled_count || 0)}
              ${metricCard('Win Rate', learner.settled_count ? pct(learner.win_rate) : 'n/a')}
              ${metricCard('Avg Realized Edge', compactNumber(learner.avg_realized_edge_usd))}
            </div>
            <div class="muted">Healthy direction means: provider configured, events arriving, labeled opportunities accumulating toward ${progress.min_labeled_target || 20}, and average realized shadow edge staying positive.</div>
          </div>`;
      }
      return '';
    }

    function renderModelHealth(models) {
      if (!models.length) {
        return '<tr><td colspan="6" class="muted">No model accounts</td></tr>';
      }
      return models.map(m => {
        const metrics = m.metrics || {};
        return `<tr>
          <td>${m.model_id}</td>
          <td>${metrics.settled_count ?? m.settled_count ?? 0}/${m.settled_target ?? 'n/a'}</td>
          <td>${Number(m.shadow_realized_pnl || 0).toFixed(2)}</td>
          <td>${pct(m.shadow_roi_pct)}</td>
          <td>${metrics.current_auc != null ? compactNumber(metrics.current_auc) : 'n/a'}</td>
          <td>${metrics.strict_gate_pass == null ? 'n/a' : yesNo(metrics.strict_gate_pass)}</td>
          <td>${m.eta_to_readiness || 'unknown'}</td>
          <td>${metrics.strict_gate_reason || metrics.last_retrain_result || metrics.provider_mode || 'n/a'}</td>
        </tr>`;
      }).join('');
    }

    function renderModelCards(models) {
      if (!models.length) return '';
      return `
        <div class="cards" style="margin:14px 0 18px;">
          ${models.map(m => {
            const metrics = m.metrics || {};
            return `<div class="card">
              <div class="muted">${metrics.model_kind || 'model'}</div>
              <h3>${m.model_id}</h3>
              <div class="grid">
                ${metricCard('Settled', `${metrics.settled_bets ?? metrics.settled_count ?? m.settled_count ?? 0}/${m.settled_target ?? 'n/a'}`)}
                ${metricCard('Open', metrics.open_positions ?? metrics.learning_open_markets ?? 0)}
                ${metricCard('Shadow P&L', Number(m.shadow_realized_pnl || 0).toFixed(2))}
                ${metricCard('ROI', pct(m.shadow_roi_pct))}
                ${metricCard('Gate', metrics.strict_gate_pass == null ? 'n/a' : yesNo(metrics.strict_gate_pass))}
                ${metricCard('ETA', m.eta_to_readiness || 'unknown')}
              </div>
              <div class="muted">Why not ready: ${metrics.strict_gate_reason || metrics.last_retrain_result || 'n/a'}</div>
            </div>`;
          }).join('')}
        </div>`;
    }

    function sparkline(points) {
      if (!points || !points.length) return "";
      const balances = points.map(p => Number(p.balance || 0));
      const min = Math.min(...balances);
      const max = Math.max(...balances);
      const span = max - min || 1;
      const coords = balances.map((b, idx) => {
        const x = (idx / Math.max(1, balances.length - 1)) * 100;
        const y = 100 - (((b - min) / span) * 100);
        return `${x},${y}`;
      }).join(" ");
      return `<svg class="sparkline" viewBox="0 0 100 100" preserveAspectRatio="none"><polyline fill="none" stroke="#79c2ff" stroke-width="2" points="${coords}" /></svg>`;
    }

    function showSection(id) {
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      const target = document.getElementById(`section-${id}`);
      if (target) target.classList.add('active');
      document.querySelectorAll('nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.section === id));
    }

    function buildNav() {
      const nav = document.getElementById('nav');
      nav.innerHTML = ["overview", "portfolios", "compare", "betfair_core", "hedge_validation", "hedge_research", "contrarian_legacy", "cascade_alpha", "mev_scout_sol"].map(id =>
        `<button data-section="${id}">${labels[id]}</button>`
      ).join('');
      nav.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => showSection(btn.dataset.section)));
    }

    function renderNotifications(state) {
      const root = document.getElementById('notifications-panel');
      const deploy = state.deploy_watcher || {};
      root.innerHTML = `
        <h3>Notifications</h3>
        <div class="grid">
          <div class="metric"><div class="label">Discord</div><div class="value ${state.discord_configured ? 'good' : 'warn'}">${state.discord_configured ? 'Configured' : 'Not configured'}</div></div>
          <div class="metric"><div class="label">Last Event</div><div class="value">${state.last_notification_ts || 'n/a'}</div></div>
          <div class="metric"><div class="label">Last Digest</div><div class="value">${state.last_digest_ts || 'n/a'}</div></div>
          <div class="metric"><div class="label">Daily Digest</div><div class="value">${state.last_daily_digest_ts || 'n/a'}</div></div>
          <div class="metric"><div class="label">Failures</div><div class="value">${state.notification_failures || 0}</div></div>
          <div class="metric"><div class="label">Deploy Watcher</div><div class="value ${deploy.enabled ? 'good' : 'warn'}">${deploy.enabled ? 'Enabled' : 'Disabled'}</div></div>
        </div>
        <div class="muted">Deploy watcher: branch=${deploy.branch || 'n/a'} last_check=${deploy.last_check_ts || 'n/a'} status=${deploy.status || 'n/a'}</div>
        <div class="actions">
          <button onclick="sendDiscordTest()">Send Discord Test</button>
        </div>`;
    }

    function renderOverview(portfolios, compareSeries, readinessMap) {
      const root = document.getElementById('overview-cards');
      root.innerHTML = portfolios.map(p => {
        const series = compareSeries[p.portfolio_id] || [];
        const readiness = readinessMap[p.portfolio_id] || {};
        const progress = readinessProgress(readiness);
        const blockers = topBlockers(readiness);
        const controls = p.control_mode === 'local_managed'
          ? `<div class="actions">
              <button onclick="controlPortfolio('${p.portfolio_id}','start')">Start</button>
              <button onclick="controlPortfolio('${p.portfolio_id}','stop')">Stop</button>
              <button onclick="controlPortfolio('${p.portfolio_id}','restart')">Restart</button>
            </div>`
          : '';
        return `<div class="card">
          <div class="muted">${p.category}</div>
          <h3>${p.label}</h3>
          <div class="grid">
            <div class="metric"><div class="label">Status</div><div class="value ${p.running ? 'good' : 'warn'}">${p.running ? 'Running' : 'Idle'}</div></div>
            <div class="metric"><div class="label">Bankroll</div><div class="value">${money(p.bankroll, p.currency)}</div></div>
            <div class="metric"><div class="label">Realized P&L</div><div class="value">${money(p.realized_pnl, p.currency)}</div></div>
            <div class="metric"><div class="label">ROI</div><div class="value">${pct(p.roi_pct)}</div></div>
            <div class="metric"><div class="label">Open</div><div class="value">${p.open_count}</div></div>
            <div class="metric"><div class="label">Readiness</div><div class="value ${readinessTone(p.readiness)}">${readinessDisplay(p.readiness)}</div></div>
            <div class="metric"><div class="label">Progress</div><div class="value">${progress.pct}%</div></div>
            <div class="metric"><div class="label">ETA</div><div class="value">${p.eta_to_readiness || 'unknown'}</div></div>
            <div class="metric"><div class="label">24h Trend</div><div class="value ${p.trend_direction === 'improving' ? 'good' : (p.trend_direction === 'worsening' ? 'bad' : 'muted')}">${p.trend_direction} ${p.progress_delta_24h ? `(${Number(p.progress_delta_24h).toFixed(1)}%)` : ''}</div></div>
          </div>
          <div class="muted">Live-readiness progress ${progress.passed != null ? `${progress.passed}/${progress.total} checks passed` : `${progress.blockers} blockers`}.</div>
          ${progressBar(progress.pct)}
          ${blockers.length ? `<div class="muted" style="margin-top:8px;">Top blockers: ${blockers.join(', ')}</div>` : '<div class="muted" style="margin-top:8px;">No active blockers in current readiness snapshot.</div>'}
          <div class="muted">Heartbeat ${p.last_heartbeat_ts || 'n/a'}</div>
          ${sparkline(series)}
          ${controls}
        </div>`;
      }).join('');
    }

    async function sendDiscordTest() {
      try {
        document.getElementById('boot-pill').textContent = 'sending discord test';
        await postJSON('/api/notifications/discord/test');
        document.getElementById('boot-pill').textContent = 'discord test sent';
      } catch (err) {
        document.getElementById('boot-pill').textContent = `Discord error: ${err.message}`;
      }
    }
    window.sendDiscordTest = sendDiscordTest;

    function renderCompare(payload) {
      const root = document.getElementById('compare-panel');
      root.innerHTML = `<table>
        <thead><tr><th>Portfolio</th><th>Mode</th><th>Realized</th><th>Unrealized</th><th>ROI</th><th>Drawdown</th><th>Open</th><th>Readiness</th><th>Trend</th></tr></thead>
        <tbody>
          ${(payload.portfolios || []).map(p => `<tr>
            <td>${p.label}</td><td>${p.mode}</td><td>${money(p.realized_pnl, p.currency)}</td><td>${money(p.unrealized_pnl, p.currency)}</td>
            <td>${pct(p.roi_pct)}</td><td>${pct(p.max_drawdown_pct)}</td><td>${p.open_count}</td><td class="${readinessTone(p.readiness)}">${readinessDisplay(p.readiness)}</td><td>${p.trend_direction} ${p.progress_delta_24h ? `(${Number(p.progress_delta_24h).toFixed(1)}%)` : ''}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    }

    function renderPortfolioTable(portfolios, readinessMap) {
      const root = document.getElementById('portfolios-panel');
      root.innerHTML = `<table>
        <thead><tr><th>Portfolio</th><th>Category</th><th>Status</th><th>Currency</th><th>Bankroll</th><th>Realized</th><th>ROI</th><th>Open</th><th>Readiness</th><th>Progress</th><th>ETA</th><th>Trend</th><th>Actions</th></tr></thead>
        <tbody>
          ${(portfolios || []).map(p => {
            const progress = readinessProgress(readinessMap[p.portfolio_id] || {});
            return `<tr>
            <td>${p.label}</td>
            <td>${p.category}</td>
            <td class="${p.running ? 'good' : 'warn'}">${p.running ? 'Running' : 'Idle'}</td>
            <td>${p.currency}</td>
            <td>${money(p.bankroll, p.currency)}</td>
            <td>${money(p.realized_pnl, p.currency)}</td>
            <td>${pct(p.roi_pct)}</td>
            <td>${p.open_count}</td>
            <td class="${readinessTone(p.readiness)}">${readinessDisplay(p.readiness)}</td>
            <td>${progress.pct}%</td>
            <td>${p.eta_to_readiness || 'unknown'}</td>
            <td>${p.trend_direction} ${p.progress_delta_24h ? `(${Number(p.progress_delta_24h).toFixed(1)}%)` : ''}</td>
            <td>${p.control_mode === 'local_managed'
              ? `<button onclick="controlPortfolio('${p.portfolio_id}','start')">Start</button>
                 <button onclick="controlPortfolio('${p.portfolio_id}','stop')">Stop</button>
                 <button onclick="controlPortfolio('${p.portfolio_id}','restart')">Restart</button>`
              : '<span class="muted">Disabled</span>'}
            </td>
          </tr>`}).join('')}
        </tbody>
      </table>`;
    }

    function readinessPanel(readiness) {
      const progress = readinessProgress(readiness);
      const blockers = topBlockers(readiness);
      const checks = readiness?.checks_v2 || readiness?.checks || [];
      return `
        <div class="grid">
          <div class="metric"><div class="label">Live-Readiness Status</div><div class="value ${readinessTone((readiness.status || '').toLowerCase() || (readiness.blockers?.length ? 'blocked' : 'monitoring'))}">${readinessDisplay((readiness.status || '').toLowerCase() || (readiness.blockers?.length ? 'blocked' : 'monitoring'))}</div></div>
          <div class="metric"><div class="label">Progress</div><div class="value">${progress.pct}%</div></div>
          <div class="metric"><div class="label">Checks Passed</div><div class="value">${progress.passed != null ? `${progress.passed}/${progress.total}` : 'n/a'}</div></div>
          <div class="metric"><div class="label">Open Blockers</div><div class="value">${progress.blockers}</div></div>
          <div class="metric"><div class="label">ETA To Trust</div><div class="value">${readiness.eta_to_readiness || readiness.eta || 'unknown'}</div></div>
          <div class="metric"><div class="label">Confidence</div><div class="value">${readiness.confidence || 'n/a'}</div></div>
        </div>
        ${progressBar(progress.pct)}
        <div class="panel" style="margin-top:12px;">
          <h4 style="margin:0 0 8px;">What is holding this back</h4>
          ${blockers.length ? `<div class="muted">${blockers.join(', ')}</div>` : '<div class="muted">No active blockers.</div>'}
        </div>
        <div class="panel" style="margin-top:12px;">
          <h4 style="margin:0 0 8px;">Checks</h4>
          <table><thead><tr><th>Check</th><th>Result</th><th>Reason</th></tr></thead><tbody>
            ${checks.slice(0, 12).map(c => `<tr><td>${c.name || 'check'}</td><td class="${c.ok ? 'good' : 'bad'}">${c.ok ? 'Pass' : 'Fail'}</td><td>${c.reason || 'n/a'}</td></tr>`).join('') || '<tr><td colspan="3" class="muted">No structured checks published yet</td></tr>'}
          </tbody></table>
        </div>`;
    }

    function renderState(targetId, state) {
      const root = document.getElementById(targetId);
      const portfolioId = state.portfolio_id;
      const account = state.account || {};
      const readiness = state.readiness || {};
      const trades = state.recent_trades || [];
      const events = state.recent_events || [];
      const models = state.models || [];
      const trend = state.trend || {};
      root.innerHTML = `
        <div class="grid">
          <div class="metric"><div class="label">Balance</div><div class="value">${money(account.current_balance, account.currency || 'USD')}</div></div>
          <div class="metric"><div class="label">Realized P&L</div><div class="value">${money(account.realized_pnl, account.currency || 'USD')}</div></div>
          <div class="metric"><div class="label">Unrealized P&L</div><div class="value">${money(account.unrealized_pnl, account.currency || 'USD')}</div></div>
          <div class="metric"><div class="label">Fees</div><div class="value">${money(account.fees_paid, account.currency || 'USD')}</div></div>
          <div class="metric"><div class="label">Slippage</div><div class="value">${Number(account.slippage_cost || 0).toFixed(4)}</div></div>
          <div class="metric"><div class="label">Drawdown</div><div class="value">${pct(account.drawdown_pct)}</div></div>
          <div class="metric"><div class="label">ETA To Trust</div><div class="value">${trend.eta_to_readiness || 'unknown'}</div></div>
          <div class="metric"><div class="label">24h Trend</div><div class="value ${trend.direction === 'improving' ? 'good' : (trend.direction === 'worsening' ? 'bad' : 'muted')}">${trend.direction || 'flat'} ${trend.progress_delta_24h ? `(${Number(trend.progress_delta_24h).toFixed(1)}%)` : ''}</div></div>
          ${portfolioId === 'betfair_core' ? `<div class="metric"><div class="label">Prediction League P&L</div><div class="value">${money(((state.raw_state || {}).prediction_league_summary || {}).realized_pnl_eur || 0, 'EUR')}</div></div>` : ''}
          ${portfolioId === 'betfair_core' ? `<div class="metric"><div class="label">Prediction League Open</div><div class="value">${(((state.raw_state || {}).prediction_league_summary || {}).open_positions || 0)}</div></div>` : ''}
        </div>
        ${portfolioId === 'betfair_core' ? `<div class="panel"><h3>Betfair Model Accounts</h3>${renderModelCards(models)}</div>` : ''}
        <div class="two-col">
          <div class="panel">
            <h3>Recent Trades</h3>
            <table><thead><tr><th>ID/Symbol</th><th>Status</th><th>Setup</th><th>P&L</th></tr></thead><tbody>
              ${trades.slice(-12).reverse().map(t => `<tr>
                <td>${t.trade_id || t.symbol || t.market_id || 'n/a'}</td>
                <td>${t.status || t.close_reason || 'n/a'}</td>
                <td>${t.setup || t.direction || t.arb_type || 'n/a'}</td>
                <td>${t.net_pnl_usd != null ? Number(t.net_pnl_usd).toFixed(2) : (t.net_profit_eur != null ? Number(t.net_profit_eur).toFixed(2) : 'n/a')}</td>
              </tr>`).join('') || '<tr><td colspan="4" class="muted">No trades yet</td></tr>'}
            </tbody></table>
          </div>
          <div class="panel">
            <h3>Progress To Live Trust</h3>
            ${readinessPanel(readiness)}
          </div>
        </div>
        ${renderDirectionPanel(portfolioId, state)}
        <div class="two-col">
          <div class="panel">
            <h3>Model Health</h3>
            <table><thead><tr><th>Model</th><th>Settled</th><th>Shadow P&L</th><th>ROI</th><th>AUC</th><th>Gate</th><th>ETA</th><th>Why not ready</th></tr></thead><tbody>
              ${renderModelHealth(models)}
            </tbody></table>
          </div>
          <div class="panel">
            <h3>Recent Events</h3>
            <table><thead><tr><th>Kind</th><th>Detail</th></tr></thead><tbody>
              ${events.slice(-12).reverse().map(e => `<tr><td>${e.kind || e.reason || e.symbol || 'event'}</td><td>${JSON.stringify(e.data || e).slice(0, 180)}</td></tr>`).join('') || '<tr><td colspan="2" class="muted">No events yet</td></tr>'}
            </tbody></table>
          </div>
        </div>
        <div class="panel">
          <h3>Raw State Snapshot</h3>
          <pre>${JSON.stringify(state.raw_state || {}, null, 2)}</pre>
        </div>`;
    }

    async function controlPortfolio(id, action) {
      try {
        document.getElementById('boot-pill').textContent = `${action} ${id}`;
        await postJSON(`/api/portfolios/${id}/${action}`);
        setTimeout(refreshAll, 1500);
      } catch (err) {
        document.getElementById('boot-pill').textContent = `Error: ${err.message}`;
      }
    }
    window.controlPortfolio = controlPortfolio;

    async function refreshAll() {
      try {
        const portfolioPayload = await getJSON('/api/portfolios');
        const comparePayload = await getJSON('/api/compare/portfolios');
        const notificationState = await getJSON('/api/notifications/state').catch(() => ({}));
        renderNotifications(notificationState);
        renderOverview(portfolioPayload.portfolios || [], comparePayload.series || {}, comparePayload.readiness || {});
        renderPortfolioTable(portfolioPayload.portfolios || [], comparePayload.readiness || {});
        renderCompare(comparePayload);
        for (const portfolioId of portfolioOrder) {
          const state = await getJSON(`/api/portfolios/${portfolioId}/state`).catch(() => null);
          if (state) renderState(`${portfolioId}-body`, state);
        }
        document.getElementById('boot-pill').textContent = `Git ${portfolioPayload.git_sha}`;
        document.getElementById('time-pill').textContent = new Date().toLocaleTimeString();
      } catch (err) {
        document.getElementById('boot-pill').textContent = `Load error: ${err.message}`;
      }
    }

    buildNav();
    refreshAll();
    setInterval(refreshAll, 10000);
  </script>
</body>
</html>
